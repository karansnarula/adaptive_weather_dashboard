name: Build

on:
  push:
    tags: ['v*']

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Create config file
        run: |
          echo '{
            "ENV": "prod",
            "APP_NAME": "Weather Dashboard",
            "API_BASE_URL": "${{ secrets.API_BASE_URL }}",
            "API_KEY": "${{ secrets.API_KEY }}",
            "GEMINI_API_URL": "https://generativelanguage.googleapis.com/v1beta/",
            "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}"
          }' > config/prod.json

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build APK
        run: flutter build apk --flavor prod --dart-define-from-file=config/prod.json

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Create config file
        run: |
          echo '{
            "ENV": "prod",
            "APP_NAME": "Weather Dashboard",
            "API_BASE_URL": "${{ secrets.API_BASE_URL }}",
            "API_KEY": "${{ secrets.API_KEY }}",
            "GEMINI_API_URL": "https://generativelanguage.googleapis.com/v1beta/",
            "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}"
          }' > config/prod.json

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build Web
        run: flutter build web --dart-define-from-file=config/prod.json

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Create config file
        run: |
          echo '{
            "ENV": "prod",
            "APP_NAME": "Weather Dashboard",
            "API_BASE_URL": "${{ secrets.API_BASE_URL }}",
            "API_KEY": "${{ secrets.API_KEY }}",
            "GEMINI_API_URL": "https://generativelanguage.googleapis.com/v1beta/",
            "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}"
          }' > config/prod.json

      - name: Set iOS deployment target
        run: sed -i '' 's/# platform :ios, .*/platform :ios, '\''15.0'\''/' ios/Podfile

      - name: Set iOS deployment target in Xcode Project settings
        run: |
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build iOS
        run: flutter build ios --flavor prod --dart-define-from-file=config/prod.json --no-codesign