name: Build

on:
  push:
    tags: ['v*']

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Create config file
        run: |
          echo '{
            "ENV": "prod",
            "APP_NAME": "Weather Dashboard",
            "API_BASE_URL": "${{ secrets.API_BASE_URL }}",
            "API_KEY": "${{ secrets.API_KEY }}",
            "MAPS_API_KEY": "${{ secrets.MAPS_API_KEY }}",
            "GEMINI_API_URL": "https://generativelanguage.googleapis.com/v1beta/",
            "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}",
            "NEWS_API_URL": "https://newsapi.org/v2/",
            "NEWS_API_KEY": "${{ secrets.NEWS_API_KEY }}"
          }' > config/prod.json

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build APK
        run: flutter build apk --flavor prod --dart-define-from-file=config/prod.json

      - name: Upload APK to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:555454956170:android:97eeb8ee13896a6a29a373
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: portfolio-testers
          file: build/app/outputs/flutter-apk/app-prod-release.apk
          releaseNotes: |
            Adaptive Weather Dashboard ${{ github.ref_name }}
            Built from tag ${{ github.ref_name }} on ${{ github.sha }}.

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Create config file
        run: |
          echo '{
            "ENV": "prod",
            "APP_NAME": "Weather Dashboard",
            "API_BASE_URL": "${{ secrets.API_BASE_URL }}",
            "API_KEY": "${{ secrets.API_KEY }}",
            "MAPS_API_KEY": "${{ secrets.MAPS_API_KEY }}",
            "GEMINI_API_URL": "https://generativelanguage.googleapis.com/v1beta/",
            "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}",
            "NEWS_API_URL": "https://newsapi.org/v2/",
            "NEWS_API_KEY": "${{ secrets.NEWS_API_KEY }}"
          }' > config/prod.json

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build Web
        run: flutter build web --dart-define-from-file=config/prod.json

      - name: Deploy to Firebase Hosting (live channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: adaptive-weather-dashboard
          channelId: live

  # iOS build job intentionally removed: we don't distribute iOS (no Apple
  # Developer Program, no TestFlight), and Flutter's --no-codesign now
  # requires a Development Team since recent versions. Web + Android cover
  # all distribution channels we actually use. Add back if/when we sign up
  # for the Developer Program.