name: Build

on:
  push:
    tags: ['v*']

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Create config file
        run: |
          echo '{
            "ENV": "prod",
            "APP_NAME": "Weather Dashboard",
            "API_BASE_URL": "${{ secrets.API_BASE_URL }}",
            "API_KEY": "${{ secrets.API_KEY }}"
          }' > config/prod.json

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build APK
        run: flutter build apk --flavor prod --dart-define-from-file=config/prod.json

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Create config file
        run: |
          echo '{
            "ENV": "prod",
            "APP_NAME": "Weather Dashboard",
            "API_BASE_URL": "${{ secrets.API_BASE_URL }}",
            "API_KEY": "${{ secrets.API_KEY }}"
          }' > config/prod.json

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build Web
        run: flutter build web --dart-define-from-file=config/prod.json

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Create config file
        run: |
          echo '{
            "ENV": "prod",
            "APP_NAME": "Weather Dashboard",
            "API_BASE_URL": "${{ secrets.API_BASE_URL }}",
            "API_KEY": "${{ secrets.API_KEY }}"
          }' > config/prod.json

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build iOS
        run: flutter build ios --flavor prod --dart-define-from-file=config/prod.json --no-codesign